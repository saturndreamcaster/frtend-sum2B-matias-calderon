<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - VetCare</title>
    <link rel="stylesheet" href="registro.css">
</head>
<body>
    <header class="reg-header">
        <a href="index.html" class="reg-logo">VetCare</a>
    </header>

    <main class="reg-main">
        <h1>Registro de propietario y mascota</h1>
        <form id="registroForm" novalidate>
            <section class="form-section">
                <h2>Sección A — Datos del dueño</h2>
                <label>Nombre completo *
                    <input type="text" name="owner_name" required>
                </label>

                <label>Fecha de nacimiento *
                    <input type="date" name="owner_dob" required>
                </label>

                <label>DNI *
                    <input type="text" name="owner_dni" required>
                </label>

                <label>Correo electrónico *
                    <input type="email" name="owner_email" required>
                </label>

                <label>Confirmar correo electrónico *
                    <input type="email" name="owner_email_confirm" required>
                </label>

                <label>Contraseña *
                    <input type="password" name="owner_password" required minlength="8">
                </label>

                <label>Confirmar contraseña *
                    <input type="password" name="owner_password_confirm" required minlength="8">
                </label>

                <label>Teléfono de contacto *
                    <input type="tel" name="owner_phone" required>
                </label>

                <label>Dirección del domicilio *
                    <input type="text" name="owner_address" required>
                </label>

                <label>Localidad *
                    <input type="text" name="owner_city" required>
                </label>

                <label>Provincia *
                    <select name="owner_province" required>
                        <option value="">Seleccione...</option>
                        <option>Buenos Aires</option>
                        <option>Córdoba</option>
                        <option>Santa Fe</option>
                        <option>Mendoza</option>
                        <option>Salta</option>
                        <option>Misiones</option>
                        <option>Neuquén</option>
                        <option>La Pampa</option>
                        <option>Formosa</option>
                        <option>Jujuy</option>
                    </select>
                </label>
            </section>

            <section class="form-section">
                <h2>Sección B — Datos de la mascota</h2>
                <label>Nombre de la mascota *
                    <input type="text" name="pet_name" required>
                </label>

                <label>Especie *
                    <select name="pet_species" id="petSpecies" required>
                        <option value="">Seleccione...</option>
                        <option value="Perro">Perro</option>
                        <option value="Gato">Gato</option>
                        <option value="Ave">Ave</option>
                        <option value="Conejo">Conejo</option>
                        <option value="Reptil">Reptil</option>
                        <option value="Otro">Otro</option>
                    </select>
                </label>

                <label id="otherSpeciesLabel" class="hidden">Especifique especie
                    <input type="text" name="pet_species_other" id="petSpeciesOther">
                </label>

                <label>Raza *
                    <input type="text" name="pet_breed" required>
                </label>

                <fieldset class="sex-field">
                    <legend>Sexo *</legend>
                    <label><input type="radio" name="pet_sex" value="Macho" required> Macho</label>
                    <label><input type="radio" name="pet_sex" value="Hembra" required> Hembra</label>
                </fieldset>

                <label>Fecha de nacimiento de la mascota *
                    <input type="date" name="pet_dob" required>
                </label>

                <label>Color o descripción física
                    <input type="text" name="pet_color">
                </label>

                <label><input type="checkbox" name="pet_neutered" id="petNeutered"> La mascota está castrada o esterilizada</label>

                <label><input type="checkbox" name="pet_microchip" id="petMicrochip"> La mascota tiene microchip</label>

                <label id="chipNumberLabel" class="hidden">Número de microchip
                    <input type="text" name="pet_chip_number" id="petChipNumber">
                </label>

                <label>Alergias o condiciones médicas (máx 250 caracteres)
                    <textarea name="pet_conditions" id="petConditions" maxlength="250" rows="4"></textarea>
                    <small><span id="charCount">0</span>/250</small>
                </label>
            </section>

            <section class="form-section">
                <h2>Sección C — Preferencia de Atención</h2>
                <div class="checkbox-group">
                    <strong>Servicios de interés:</strong>
                    <label><input type="checkbox" name="interest_services" value="Consulta general"> Consulta general</label>
                    <label><input type="checkbox" name="interest_services" value="Vacunacion"> Vacunación</label>
                    <label><input type="checkbox" name="interest_services" value="Cirugia"> Cirugía</label>
                    <label><input type="checkbox" name="interest_services" value="Grooming"> Grooming</label>
                    <label><input type="checkbox" name="interest_services" value="Internacion"> Internación</label>
                    <label><input type="checkbox" name="interest_services" value="Tienda online"> Tienda online</label>
                </div>

                <div class="radio-group">
                    <strong>Turno preferido:</strong>
                    <label><input type="radio" name="preferred_shift" value="Manana" required> Mañana</label>
                    <label><input type="radio" name="preferred_shift" value="Tarde" required> Tarde</label>
                    <label><input type="radio" name="preferred_shift" value="Indistinto" required> Indistinto</label>
                </div>

                <label>Veterinario preferido
                    <select name="preferred_vet">
                        <option>Sin preferencia</option>
                        <option>Dr. Ignacio Pérez</option>
                        <option>Dra. Laura Santoro</option>
                        <option>Dr. Martín Duarte</option>
                    </select>
                </label>

                <label>Frecuencia estimada de visitas
                    <select name="visit_frequency">
                        <option>Primera vez</option>
                        <option>Mensual</option>
                        <option>Cada 3 meses</option>
                        <option>Según necesidad</option>
                    </select>
                </label>

                <label>¿Cómo nos conoció?
                    <select name="how_found">
                        <option>Redes sociales</option>
                        <option>Recomendación</option>
                        <option>Búsqueda web</option>
                        <option>Paso por el local</option>
                        <option>Otro</option>
                    </select>
                </label>
            </section>

            <section class="form-section">
                <h2>Sección D — Confirmación</h2>
                <label>Observaciones adicionales (máx 300 caracteres)
                    <textarea name="additional_observations" id="additionalObservations" maxlength="300" rows="4"></textarea>
                    <small><span id="obsCount">0</span>/300</small>
                </label>

                <label><input type="checkbox" name="accept_reminders"> Acepta recibir recordatorios de turnos por correo electrónico</label>

                <label><input type="checkbox" name="accept_terms" id="acceptTerms" required> Acepto los <a href="#" target="_blank">Términos y Condiciones</a> *</label>

                <label><input type="checkbox" name="accept_privacy" id="acceptPrivacy" required> Acepto la Política de Privacidad *</label>
            </section>

            <div class="form-actions">
                <button type="submit" class="submit-btn">Crear cuenta</button>
                <button type="reset" class="reset-btn">Limpiar</button>
                <div class="back-link"><a href="index.html">Volver al inicio</a></div>
            </div>
        </form>
    </main>

    <script src="validaciones.js"></script>
    <script src="registro.js"></script>
</body>
</html>
